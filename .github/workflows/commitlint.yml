name: Commitlint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json
          failOnWarnings: false
          helpURL: https://www.conventionalcommits.org
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR if commits are invalid
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Commit message validation failed.\n\n' +
                    'Please ensure your commits follow the [Conventional Commits](https://www.conventionalcommits.org) format:\n\n' +
                    '```\n' +
                    '<type>(<scope>): <description>\n' +
                    '```\n\n' +
                    '**Allowed types:** feat, fix, docs, style, refactor, perf, test, chore, ci, revert\n\n' +
                    'See [CONTRIBUTING.md](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/blob/main/CONTRIBUTING.md#commit-conventions) for details.'
            })
        continue-on-error: true
